<!DOCTYPE html>
<html lang="en" data-theme="stone">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segment Scenarios — Magazine Layout Explorer</title>
  <style>
    /* ===== Reset & Page ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :focus-visible {
      outline: 2px solid var(--smtc-foreground-content-neutral-primary, #272320);
      outline-offset: 2px;
      border-radius: 4px;
    }

    body {
      font-family: var(--text-style-default-regular-fontfamily, "Segoe UI Variable", "Segoe UI", system-ui, sans-serif);
      background: #ffffff;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Page Header ===== */
    .page-header {
      padding: 24px 40px 16px;
      border-bottom: 1px solid var(--smtc-stroke-divider-default, rgba(0,0,0,0.08));
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .page-header__top {
      display: flex;
      align-items: baseline;
      gap: 24px;
    }
    .page-header__left { flex: 1; }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
      margin-top: 4px;
    }

    /* ===== Badge Toggle ===== */
    .badge-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      padding: 4px 10px;
      border-radius: var(--smtc-corner-ctrl-sm-rest, 8px);
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
      transition: background 0.15s;
    }
    .badge-toggle:hover {
      background: var(--mai-smtc-background-card-on-primary-alt-selected, #e5e0dc);
    }
    .badge-toggle__switch {
      width: 28px; height: 16px;
      border-radius: 8px;
      background: rgba(0,0,0,0.15);
      position: relative;
      transition: background 0.2s;
    }
    .badge-toggle__switch.on { background: var(--smtc-foreground-content-neutral-primary, #272320); }
    .badge-toggle__switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .badge-toggle__switch.on::after { transform: translateX(12px); }
    .badge-toggle__label {
      font-size: 11px; font-weight: 600;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }

    /* ===== App Layout ===== */
    .app-container {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ===== Segment Tabs (top bar) ===== */
    .segment-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }
    .segment-tabs::-webkit-scrollbar { display: none; }
    .segment-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--smtc-corner-ctrl-rest, 12px);
      cursor: pointer;
      transition: background 0.15s;
      border: 1.5px solid transparent;
      background: transparent;
      white-space: nowrap;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .segment-tab:hover {
      background: var(--bing-smtc-background-card-on-primary-alt-hover, rgba(0,0,0,0.03));
    }
    .segment-tab.active {
      background: var(--bing-smtc-background-card-on-primary-alt-rest, #f8f4f1);
      border-color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .segment-tab__icon { font-size: 16px; }
    .segment-tab__nav-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
      background: var(--smtc-foreground-content-neutral-primary, #272320);
      color: white; text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* ===== Intention Sidebar ===== */
    .intention-sidebar {
      width: 300px;
      flex-shrink: 0;
      border-right: 1px solid var(--smtc-stroke-divider-default, rgba(0,0,0,0.08));
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: #ffffff;
      overflow-y: auto;
    }
    .intention-sidebar__header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px 8px;
      justify-content: space-between;
    }
    .intention-sidebar__label {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.5));
    }
    .intention-sidebar__hint {
      font-size: 10px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.35));
      padding: 0 12px 8px;
    }

    /* ===== Content Area ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 40px 60px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ===== Intention List ===== */
    .intention-list {
      display: flex; flex-direction: column; gap: 2px;
      flex: 1;
      overflow-y: auto;
    }
    .intention-list__item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border-radius: var(--smtc-corner-ctrl-rest, 12px);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      border: 1.5px solid transparent;
      user-select: none;
    }
    .intention-list__item:hover {
      background: var(--bing-smtc-background-card-on-primary-alt-hover, rgba(0,0,0,0.03));
    }
    .intention-list__item.active {
      background: var(--bing-smtc-background-card-on-primary-alt-rest, #f8f4f1);
      border-color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .intention-list__item.highlighted {
      background: var(--bing-smtc-background-card-on-primary-alt-rest, #f8f4f1);
    }
    .intention-list__rank {
      font-size: 12px; font-weight: 700; width: 20px; text-align: center; flex-shrink: 0;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.35));
    }
    .intention-list__item.active .intention-list__rank {
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .intention-list__label {
      font-size: 13px; font-weight: 600; line-height: 18px; flex: 1; min-width: 0;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .intention-type-badge {
      font-size: 9px; font-weight: 600;
      padding: 2px 6px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: 0.3px;
      display: inline-block; flex-shrink: 0;
    }
    .intention-type-badge--informational { background: #e8f0fe; color: #1a73e8; }
    .intention-type-badge--navigational { background: #e6f4ea; color: #1e8e3e; }
    .intention-type-badge--transactional { background: #fef7e0; color: #e37400; }
    .intention-primary-badge {
      font-size: 9px; font-weight: 700;
      color: white;
      background: var(--smtc-foreground-content-neutral-primary, #272320);
      padding: 2px 5px; border-radius: 4px;
      display: inline-block; flex-shrink: 0;
    }

    /* Expandable intention detail (inline) */
    .intention-list__item-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 0;
      margin: 0 4px;
    }
    .intention-list__item-detail.expanded {
      max-height: 500px;
      opacity: 1;
    }
    .intention-list__item-detail__inner {
      padding: 10px 12px 14px;
      background: var(--bing-smtc-background-card-on-primary-alt-rest, #f8f4f1);
      border-radius: 0 0 12px 12px;
      margin-top: -2px;
    }
    .intention-list__item-detail__bullets {
      list-style: disc;
      margin: 0; padding: 0 0 0 16px;
      display: flex; flex-direction: column; gap: 5px;
      font-size: 12px; line-height: 17px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.75));
    }
    .intention-list__item-detail__bullets strong {
      color: var(--smtc-foreground-content-neutral-primary, #272320);
      font-weight: 600;
    }

    /* ===== Magazine Section ===== */
    .magazine-section { display: flex; flex-direction: column; gap: 16px; }
    .magazine-header {
      display: flex; align-items: center; gap: 12px; padding: 0 4px;
    }
    .magazine-header__query {
      font-size: 18px; font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .magazine-header__template {
      font-size: 12px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
      margin-left: auto;
    }

    /* Intention badges as overlay (outside cards to avoid overflow clipping) */
    .badge-overlay {
      position: absolute; top: 0; left: 0;
      width: 1208px; height: 424px;
      pointer-events: none;
      transform-origin: top left;
    }
    .card-intent-badge {
      position: absolute;
      display: flex; gap: 4px; z-index: 10;
      pointer-events: auto;
    }
    .card-intent-badge--hidden { display: none; }
    .card-intent-badge__item {
      font-size: 11px; font-weight: 700;
      padding: 3px 7px; border-radius: 5px;
      background: rgba(39,35,32,0.8); color: white;
      backdrop-filter: blur(4px);
      cursor: default;
      position: relative;
    }
    .card-intent-badge__item--primary { background: rgba(30,142,62,0.85); }
    /* Tooltip */
    .card-intent-badge__item .badge-tooltip {
      position: absolute;
      bottom: calc(100% + 6px); left: 50%;
      transform: translateX(-50%);
      background: var(--smtc-foreground-content-neutral-primary, #272320);
      color: white;
      font-size: 11px; font-weight: 500;
      padding: 4px 10px; border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card-intent-badge__item .badge-tooltip::after {
      content: '';
      position: absolute; top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .card-intent-badge__item:hover .badge-tooltip { opacity: 1; }

    /* Card highlighting on intention hover */
    .slot-wrapper {
      position: relative;
      transition: box-shadow 0.2s;
    }
    .slot-wrapper.highlighted {
      box-shadow: 0 0 0 3px var(--smtc-foreground-content-neutral-primary, #272320);
      border-radius: var(--mai-smtc-corner-card-default, 24px);
      z-index: 5;
    }

    /* Pulse animation for initial discovery */
    @keyframes pulse-highlight {
      0% { box-shadow: 0 0 0 0 rgba(39,35,32,0.3); }
      50% { box-shadow: 0 0 0 4px rgba(39,35,32,0.15); }
      100% { box-shadow: 0 0 0 0 rgba(39,35,32,0); }
    }
    .slot-wrapper.pulse { animation: pulse-highlight 0.8s ease-out; }

    /* ===== Grid Templates ===== */

    /* Scale magazine to fit container */
    .magazine-wrapper {
      position: relative;
      overflow: visible;
    }
    .magazine-scaler {
      display: inline-block;
      position: relative;
    }

    /* --- Template 3: Hero Left (5×4 + 3×4 + 3×2 + 3×2 = 44u) --- */
    .magazine-grid--hero-left {
      display: flex;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 1208px; height: 424px;
      transform-origin: top left;
    }
    .magazine-grid--hero-left .slot-a { width: 536px; height: 424px; flex-shrink: 0; }
    .magazine-grid--hero-left .slot-b { width: 312px; height: 424px; flex-shrink: 0; }
    .magazine-grid--hero-left .slot-cd {
      display: flex; flex-direction: column;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 312px; flex-shrink: 0;
    }
    .magazine-grid--hero-left .slot-c,
    .magazine-grid--hero-left .slot-d { width: 312px; height: 200px; }

    /* --- Template 6: Photo Left (3×4 + 5×4 + 3×2 + 3×2 = 44u) --- */
    .magazine-grid--photo-left {
      display: flex;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 1208px; height: 424px;
      transform-origin: top left;
    }
    .magazine-grid--photo-left .slot-a { width: 312px; height: 424px; flex-shrink: 0; }
    .magazine-grid--photo-left .slot-b { width: 536px; height: 424px; flex-shrink: 0; }
    .magazine-grid--photo-left .slot-cd {
      display: flex; flex-direction: column;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 312px; flex-shrink: 0;
    }
    .magazine-grid--photo-left .slot-c,
    .magazine-grid--photo-left .slot-d { width: 312px; height: 200px; }

    /* ===== Professor Photo Card (3×4 full-bleed image) ===== */
    .professor-photo {
      width: 100%; height: 100%; position: relative; overflow: hidden;
      border-radius: var(--mai-smtc-corner-card-default, 24px);
    }
    .professor-photo img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .professor-photo__caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 16px 16px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
    }
    .professor-photo__name {
      font-size: 18px; font-weight: 700; line-height: 24px;
    }
    .professor-photo__role {
      font-size: 13px; line-height: 18px; opacity: 0.85; margin-top: 2px;
    }

    /* --- Template 5: Hero & Stack (5×4 + 4× 3×2 = 44u) --- */
    .magazine-grid--hero-stack {
      display: grid;
      grid-template-columns: 536px 312px 312px;
      grid-template-rows: 200px 200px;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 1208px; height: 424px;
      transform-origin: top left;
    }
    .magazine-grid--hero-stack .slot-a { grid-column: 1; grid-row: 1 / 3; height: 424px; }
    .magazine-grid--hero-stack .slot-b { grid-column: 2; grid-row: 1; }
    .magazine-grid--hero-stack .slot-c { grid-column: 3; grid-row: 1; }
    .magazine-grid--hero-stack .slot-d { grid-column: 2; grid-row: 2; }
    .magazine-grid--hero-stack .slot-e { grid-column: 3; grid-row: 2; }

    /* --- Template 1: Dashboard Mix (4×4 + 2×4 + 3×2 + 2×2 + 5×2 = 44u) --- */
    .magazine-grid--dashboard-mix {
      display: grid;
      grid-template-columns: 424px 200px 312px 200px;
      grid-template-rows: 200px 200px;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 1208px; height: 424px;
      transform-origin: top left;
    }
    .magazine-grid--dashboard-mix .slot-a { grid-column: 1; grid-row: 1 / 3; height: 424px; }
    .magazine-grid--dashboard-mix .slot-b { grid-column: 2; grid-row: 1 / 3; height: 424px; }
    .magazine-grid--dashboard-mix .slot-c { grid-column: 3; grid-row: 1; }
    .magazine-grid--dashboard-mix .slot-d { grid-column: 4; grid-row: 1; }
    .magazine-grid--dashboard-mix .slot-e { grid-column: 3 / 5; grid-row: 2; }

    /* --- Template 5: Hero Map (5×4 + 3×4 + 3×2 + 3×2 / 8×2 + 3×2 = 66u, two rows) --- */
    .magazine-grid--hero-map {
      display: grid;
      grid-template-columns: 536px 312px 312px;
      grid-template-rows: 200px 200px 200px;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 1208px; height: 648px;
      transform-origin: top left;
    }
    .magazine-grid--hero-map .slot-a { grid-column: 1; grid-row: 1 / 3; height: 424px; }
    .magazine-grid--hero-map .slot-b { grid-column: 2; grid-row: 1 / 3; height: 424px; }
    .magazine-grid--hero-map .slot-c { grid-column: 3; grid-row: 1; }
    .magazine-grid--hero-map .slot-d { grid-column: 3; grid-row: 2; }
    .magazine-grid--hero-map .slot-e { grid-column: 1 / 3; grid-row: 3; }
    .magazine-grid--hero-map .slot-f { grid-column: 3; grid-row: 3; }

    /* ===== Answer Bar Card (bottom-row wide card) ===== */
    .answer-bar {
      display: flex;
      height: 100%;
      background: white;
      border-radius: var(--mai-smtc-corner-card-default, 24px);
      border: 1px solid var(--smtc-stroke-card-on-primary-rest, rgba(0,0,0,0.1));
      overflow: hidden;
    }
    .answer-bar__image {
      width: 160px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .answer-bar__image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .answer-bar__info {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }
    .answer-bar__title-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .answer-bar__title {
      font-size: 18px;
      line-height: 24px;
      font-weight: 600;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .answer-bar__verified {
      width: 16px; height: 16px; flex-shrink: 0;
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3c51b4);
    }
    .answer-bar__url {
      font-size: 13px;
      line-height: 20px;
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3c51b4);
      text-decoration: none;
    }
    .answer-bar__url:hover { text-decoration: underline; }
    .answer-bar__rating {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      line-height: 20px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
    }
    .answer-bar__rating-icon {
      color: #e74c3c;
    }
    .answer-bar__rating-link {
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3c51b4);
      text-decoration: none;
    }
    .answer-bar__rating-link:hover { text-decoration: underline; }
    .answer-bar__meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 13px;
      line-height: 20px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.75));
    }
    .answer-bar__meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .answer-bar__meta-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
    }
    .answer-bar__meta-label {
      font-weight: 600;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .answer-bar__actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px;
      justify-content: center;
      flex-shrink: 0;
    }
    .answer-bar__action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 20px;
      border-radius: var(--smtc-corner-ctrl-rest, 8px);
      font-size: 13px;
      line-height: 20px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      text-decoration: none;
      min-width: 120px;
    }
    .answer-bar__action-btn--primary {
      background: var(--bing-smtc-background-ctrl-brand-rest, #322d29);
      color: var(--smtc-foreground-ctrl-on-brand-rest, white);
    }
    .answer-bar__action-btn--primary:hover {
      background: var(--bing-smtc-background-ctrl-brand-hover, #463f3a);
    }
    .answer-bar__action-btn--secondary {
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .answer-bar__action-btn--secondary:hover {
      background: var(--mai-smtc-background-card-on-primary-alt-selected, #e5e0dc);
    }

    /* ===== Map Card ===== */
    .map-card {
      width: 100%; height: 100%;
      border-radius: var(--mai-smtc-corner-card-default, 24px);
      overflow: hidden;
      position: relative;
    }
    .map-card img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .map-card__pin {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -100%);
      width: 28px; height: 36px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    /* --- Template 4: Hero Wide (6×4 + 2×2 + 3×2 + 5×2 = 44u) --- */
    .magazine-grid--hero-wide {
      display: grid;
      grid-template-columns: 648px 200px 312px;
      grid-template-rows: 200px 200px;
      gap: var(--smtc-gap-between-content-x-large, 24px);
      width: 1208px; height: 424px;
      transform-origin: top left;
    }
    .magazine-grid--hero-wide .slot-a { grid-column: 1; grid-row: 1 / 3; height: 424px; }
    .magazine-grid--hero-wide .slot-b { grid-column: 2; grid-row: 1; }
    .magazine-grid--hero-wide .slot-c { grid-column: 3; grid-row: 1; }
    .magazine-grid--hero-wide .slot-d { grid-column: 2 / 4; grid-row: 2; }

    /* ===== Card Shell ===== */
    .card {
      background: var(--bing-smtc-background-card-on-primary-alt-rest, #f8f4f1);
      border-radius: var(--mai-smtc-corner-card-default, 24px);
      overflow: hidden; display: flex; flex-direction: column; position: relative;
    }
    .card--padded { padding: var(--mai-smtc-padding-card-default, 20px); }
    /* Tighter padding for small cards in hero-wide template */

    /* ===== Hero Composite Card ===== */
    .hero-composite { display: flex; flex-direction: column; height: 100%; }

    /* ===== Nav Anchor Card (Cocaurus review style) ===== */
    .nav-anchor { display: flex; flex-direction: column; justify-content: space-between; height: 100%; background: white; border-radius: var(--mai-smtc-corner-card-default, 24px); border: 1px solid var(--smtc-stroke-card-on-primary-rest, rgba(0,0,0,0.1)); padding: 20px; }
    .nav-anchor__images {

    .nav-anchor__img-side { flex: 1; min-width: 0; position: relative; overflow: hidden; }

    .nav-anchor__img-btn {

    .nav-anchor__info {

      padding-top: 8px;
    }
    .nav-anchor__attribution {

    .nav-anchor__favicon {
      width: 28px; height: 28px; border-radius: 100px; flex-shrink: 0;
      background: var(--bing-smtc-background-ctrl-neutral-rest, #f5f5f5);
      border: 0.667px solid rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-size: 16px;
    }
    .nav-anchor__favicon img { width: 18px; height: 18px; object-fit: cover; }
    .nav-anchor__attr-text { display: flex; flex-direction: column; }
    .nav-anchor__site-name {
      font-size: 14px; line-height: 22px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.8));
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .nav-anchor__site-url {
      font-size: 13px; line-height: 20px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .nav-anchor__title {
      font-size: 24px; line-height: 32px; font-weight: 400;
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3c51b4);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      cursor: pointer; text-decoration: none;
    }
    .nav-anchor__title:hover { text-decoration: underline; }
    .nav-anchor__images img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
    .nav-anchor__img-main:hover img,
    .nav-anchor__img-side:hover img { transform: scale(1.05); }
    .nav-anchor__desc {
      font-size: 14px; line-height: 22px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.75));
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .nav-anchor__desc--4line {
      -webkit-line-clamp: 4;
    }
    .nav-anchor__links { display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0; overflow: hidden; }
    .nav-anchor__link {
      display: flex; align-items: center; gap: 4px;
      height: 38px; padding: 0 12px; border-radius: var(--smtc-corner-ctrl-rest, 8px);
      border: 1px solid var(--smtc-stroke-divider-default, rgba(0,0,0,0.1));
      font-size: 14px; line-height: 22px; font-weight: 700;
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3c51b4);
      cursor: pointer; text-decoration: none; background: transparent;
    }
    .nav-anchor__link:hover {
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
    }
    .nav-anchor__link .bing-icon { flex-shrink: 0; }
    /* Nav anchor card with logo variant (luxury brands) */
    .nav-anchor__logo {
      width: 84px; height: 84px;
      border-radius: 9999px;
      background: white;
      border: 1px solid rgba(0,0,0,0.08);
      box-shadow: -5px 4px 12px 0px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: -68px;
      margin-left: 16px;
      margin-bottom: -16px;
      position: relative; z-index: 3;
      pointer-events: none;
    }
    .nav-anchor__logo img {
      width: 76px; height: 76px;
      border-radius: 9999px;
      object-fit: cover;
      display: block;
    }
    .nav-anchor--with-logo .nav-anchor__info { padding-top: 8px; }
    /* Nav anchor card controls its own background — make card shell transparent */
    .card:has(.nav-anchor) { background: transparent; }

    .hero-composite__image { flex: 1; min-height: 0; overflow: hidden; position: relative; }
    .hero-composite__image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero-composite__body {
      padding: 16px 20px 20px; display: flex; flex-direction: column;
      gap: 8px; flex-shrink: 0;
    }
    .hero-composite__entity-row { display: flex; align-items: center; gap: 8px; }
    .hero-composite__entity-name {
      font-size: 18px; line-height: 24px; font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .hero-composite__entity-type {
      font-size: 11px; line-height: 14px; font-weight: 600;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
      padding: 2px 8px; border-radius: var(--smtc-corner-ctrl-sm-rest, 12px); flex-shrink: 0;
    }
    .hero-composite__desc {
      font-size: 13px; line-height: 20px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.75));
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .hero-composite__site-link {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
      border-radius: var(--smtc-corner-ctrl-rest, 12px);
      cursor: pointer; text-decoration: none; transition: background 0.15s; margin-top: 4px;
    }
    .hero-composite__site-link:hover {
      background: var(--mai-smtc-background-card-on-primary-alt-selected, #e5e0dc);
    }
    .hero-composite__site-favicon {
      width: 20px; height: 20px; border-radius: 4px;
      background: white; display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; overflow: hidden;
    }
    .hero-composite__site-info { display: flex; flex-direction: column; gap: 0; min-width: 0; flex: 1; }
    .hero-composite__site-name {
      font-size: 14px; line-height: 20px; font-weight: 600;
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3f3935);
    }
    .hero-composite__site-url {
      font-size: 11px; line-height: 14px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hero-composite__site-arrow {
      font-size: 14px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.5));
      flex-shrink: 0;
    }
    .hero-composite__also-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .hero-composite__also-link {
      font-size: 12px; line-height: 16px; padding: 4px 10px;
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
      border-radius: var(--smtc-corner-ctrl-sm-rest, 12px);
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3f3935);
      cursor: pointer; text-decoration: none; font-weight: 500;
    }
    .hero-composite__also-link:hover {
      background: var(--mai-smtc-background-card-on-primary-alt-selected, #e5e0dc);
    }

    /* ===== News Article Card (bento 3×2 style: header + body + continue reading + source) ===== */
    .news-card { display: flex; flex-direction: column; gap: 8px; height: 100%; }
    .news-card__header {
      font-size: 14px; line-height: 22px; font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .news-card__body {
      font-size: 14px; line-height: 22px; font-weight: 400;
      color: var(--smtc-foreground-content-neutral-secondary, rgba(0,0,0,0.8));
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-card__continue {
      display: flex; align-items: center; gap: 4px;
      font-size: 13px; line-height: 20px; font-weight: 400;
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3c51b4);
      cursor: pointer; text-decoration: none;
    }
    .news-card__continue:hover { text-decoration: underline; }
    .news-card__continue-arrow { font-size: 12px; }
    .news-card__source {
      display: flex; align-items: center; gap: 4px; margin-top: auto;
      font-size: 11px; line-height: 13px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
    }
    .news-card__source-favicon {
      width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;
      background: var(--bing-smtc-background-ctrl-neutral-rest, rgba(0,0,0,0.1));
      border: 1px solid rgba(0,0,0,0.1);
    }
    .news-card__source-dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: currentColor; opacity: 0.6;
    }

    /* ===== Image Card ===== */
    .image-card { position: relative; overflow: hidden; }
    .image-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .image-card__caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px 16px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      color: white; font-size: 12px; line-height: 16px; font-weight: 600;
    }

    /* ===== ACF Image Card (5-image grid for 5×4) ===== */
    .image-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      position: relative;
      width: 100%; height: 100%;
    }
    .image-card__content {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
      border-radius: var(--mai-smtc-corner-card-default, 24px);
    }
    .image-card__grid--rows {
      display: flex;
      flex-direction: column;
      gap: var(--smtc-gap-between-content-xxx-small, 2px);
      width: 100%; height: 100%;
    }
    .image-card__row {
      display: flex;
      gap: var(--smtc-gap-between-content-xxx-small, 2px);
      flex: 1 0 0;
      min-height: 0;
    }
    .image-card__row--hero { flex: 1.5 0 0; }
    .image-card__image {
      flex: 1 0 0;
      overflow: hidden;
      position: relative;
      min-width: 0;
    }
    .image-card__image img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
      transition: transform 0.3s;
    }
    .image-card__image:hover img { transform: scale(1.05); }
    .image-card__image-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 10px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.45));
      color: white;
      font-size: var(--bing-smtc-text-global-caption2-fontSize, 11px);
      font-weight: 600; line-height: 14px;
      pointer-events: none;
    }
    .image-card__brand-overlay {
      position: absolute; top: 12px; left: 14px; z-index: 2;
      font-size: 20px; font-weight: 700; color: white;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }

    /* ===== Image + Site Links Combo Card (3×4) ===== */
    .image-site-card {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      overflow: hidden;
      border-radius: var(--mai-smtc-corner-card-default, 24px);
    }
    .image-site-card__image {
      flex: 0 0 180px;
      overflow: hidden; position: relative;
    }
    .image-site-card__image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .image-site-card__body {
      flex: 1;
      display: flex; flex-direction: column;
      gap: var(--smtc-gap-between-content-x-small, 8px);
      padding: var(--smtc-padding-ctrl-lg-text-top, 12px) var(--smtc-padding-ctrl-lg-horizontal-default, 16px) var(--smtc-padding-ctrl-lg-text-bottom, 12px);
      background: var(--bing-smtc-background-card-on-primary-alt-rest, #f8f4f1);
    }
    .image-site-card__site-row {
      display: flex; align-items: center; gap: 8px;
    }
    .image-site-card__favicon {
      width: 20px; height: 20px; border-radius: var(--smtc-corner-ctrl-sm-rest, 4px);
      overflow: hidden; flex-shrink: 0;
    }
    .image-site-card__favicon img { width: 100%; height: 100%; object-fit: cover; }
    .image-site-card__site-info { display: flex; flex-direction: column; }
    .image-site-card__site-name {
      font-size: var(--bing-smtc-text-global-body3-fontSize, 14px);
      font-weight: var(--bing-smtc-text-style-default-header-weight, 700);
      line-height: var(--bing-smtc-text-global-body3-lineHeight, 22px);
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .image-site-card__site-url {
      font-size: var(--bing-smtc-text-global-caption2-fontSize, 11px);
      line-height: 14px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.5));
    }
    .image-site-card__links {
      display: flex; flex-direction: column; gap: 0; flex: 1;
    }
    .image-site-card__link {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--smtc-stroke-divider-default, rgba(0,0,0,0.06));
      text-decoration: none; color: inherit; cursor: pointer;
      font-size: var(--bing-smtc-text-global-body3-fontSize, 14px);
      font-weight: 500;
      line-height: var(--bing-smtc-text-global-body3-lineHeight, 22px);
      color: var(--bing-smtc-ctrl-link-foreground-brand-rest, #3f3935);
    }
    .image-site-card__link:last-child { border-bottom: none; }
    .image-site-card__link:hover {
      background: var(--bing-smtc-background-card-on-primary-alt-hover, rgba(0,0,0,0.03));
      margin: 0 -8px; padding-left: 8px; padding-right: 8px;
      border-radius: var(--smtc-corner-ctrl-sm-rest, 12px);
    }
    .image-site-card__link-arrow {
      margin-left: auto;
      font-size: 14px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.4));
    }

    /* ===== Overview Card ===== */
    .overview-card { display: flex; flex-direction: column; gap: var(--smtc-gap-between-content-x-small, 8px); height: 100%; }
    .overview-card__label {
      font-size: 11px; line-height: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
    }
    .overview-card__title {
      font-size: 16px; line-height: 24px; font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .overview-card__intro {
      font-size: 14px; line-height: 22px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.75));
      flex: 1;
      display: -webkit-box; -webkit-line-clamp: 6; -webkit-box-orient: vertical; overflow: hidden;
    }
    /* Wide overview in photo-left gets more breathing room */
    .magazine-grid--photo-left .slot-b .overview-card__intro { -webkit-line-clamp: 8; }
    .overview-card__facts {
      display: flex; flex-direction: column; gap: 6px;
      padding-top: 8px;
      border-top: 1px solid var(--smtc-stroke-divider-default, rgba(0,0,0,0.08));
    }
    /* Wide overview: facts flow horizontally with wrap */
    .overview-card__facts--row {
      flex-direction: row; flex-wrap: wrap; gap: 4px 16px;
    }
    .overview-card__facts--row .overview-card__fact {
      min-width: 140px;
    }
    .overview-card__fact { display: flex; gap: 8px; font-size: 13px; line-height: 20px; }
    .overview-card__fact-label { color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6)); white-space: nowrap; }
    .overview-card__fact-value { color: var(--smtc-foreground-content-neutral-primary, #272320); font-weight: 600; }
    .overview-card__source {
      display: flex; align-items: center; gap: 4px; margin-top: auto;
      font-size: 11px; line-height: 13px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
    }
    .overview-card__source-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.4));
    }

    /* ===== List Card ===== */
    .list-card { display: flex; flex-direction: column; gap: var(--smtc-gap-between-content-x-small, 8px); height: 100%; }
    .list-card__header {
      font-size: 14px; line-height: 22px; font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }
    .list-card__items { display: flex; flex-direction: column; gap: 0; flex: 1; justify-content: space-between; }
    .list-card__item {
      display: flex; align-items: center; gap: var(--smtc-gap-between-content-x-small, 8px);
      padding: 8px 0;
      border-bottom: 1px solid var(--smtc-stroke-divider-default, rgba(0,0,0,0.06));
      text-decoration: none; color: inherit; cursor: pointer;
    }
    .list-card__item:last-child { border-bottom: none; }
    .list-card__item:hover {
      background: var(--bing-smtc-background-card-on-primary-alt-hover, rgba(0,0,0,0.03));
      margin: 0 -8px; padding-left: 8px; padding-right: 8px;
      border-radius: var(--smtc-corner-ctrl-sm-rest, 12px);
    }
    .list-card__item-icon {
      width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, #6e6a67);
    }
    .bing-icon {
      width: 16px; height: 16px; flex-shrink: 0;
      fill: currentColor;
    }
    .list-card__item-text {
      flex: 1; font-size: 14px; line-height: 22px;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .list-card__item-meta {
      font-size: 12px; line-height: 16px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
      flex-shrink: 0;
    }

    /* ===== Subdivided Card ===== */
    .subdivided-card { display: flex; flex-direction: column; gap: var(--smtc-gap-between-content-xx-small, 4px); height: 100%; }
    .subdivided-card__header {
      font-size: 14px; line-height: 22px; font-weight: 700;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
      margin-bottom: 4px;
    }
    .subdivided-card__grid { display: grid; gap: var(--smtc-gap-between-content-xx-small, 4px); flex: 1; }
    .subdivided-card__grid--2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .subdivided-card__cell {
      background: var(--bing-smtc-background-ctrl-neutral-rest, #efeae7);
      border-radius: var(--mai-smtc-corner-list-card-nested-default, 8px);
      padding: 12px 16px; display: flex; flex-direction: column; gap: 2px;
      justify-content: center;
    }
    /* Tighter cells in small 2×2 slots (200px height cards) */
    .magazine-grid--hero-wide .slot-b .subdivided-card__cell { padding: 8px 12px; }
    .subdivided-card__cell-label {
      font-size: 11px; line-height: 14px;
      color: var(--bing-smtc-foreground-content-neutral-tertiary, rgba(0,0,0,0.6));
    }
    .subdivided-card__cell-value {
      font-size: 14px; line-height: 20px; font-weight: 600;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ===== SERP Value Annotation ===== */

    .serp-value {
      font-size: 13px; line-height: 20px;
      color: var(--bing-smtc-foreground-content-neutral-secondary-alt, rgba(0,0,0,0.65));
      padding: 4px 4px 0; font-style: italic;
    }
    .serp-value strong {
      font-weight: 600; font-style: normal;
      color: var(--smtc-foreground-content-neutral-primary, #272320);
    }

    /* ===== Pole Slide (Tabs + Carousel) ===== */

    .pole-slide {
      display: flex;
      flex-direction: column;
      gap: var(--smtc-gap-between-content-medium, 16px);
      margin-top: 24px;
    }
    .pole-slide__tabs {
      display: flex;
      gap: var(--smtc-gap-between-content-x-small, 8px);
      align-items: center;
      overflow: hidden;
    }
    .pole-slide__tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 16px;
      border-radius: var(--smtc-corner-ctrl-rest, 8px);
      background: var(--bing-smtc-background-ctrl-subtle-rest, #f8f4f1);
      font-size: 13px;

// ============================================================
// RENDER: Segment Tabs (horizontal, top of page)
// ============================================================
function renderSegmentTabs() {
  const container = document.getElementById("segmentTabs");
  let html = '';
  for (const [id, seg] of Object.entries(SEGMENTS)) {
    const active = state.activeSegment === id ? " active" : "";
    html += `<button class="segment-tab${active}" data-segment="${id}"
               onclick="selectSegment('${id}')">${seg.icon} ${seg.label}</button>`;
  }
  container.innerHTML = html;
}

// ============================================================
// RENDER: Intention Sidebar (left, expandable details)
// ============================================================
function renderIntentionSidebar() {
  const sidebar = document.getElementById("intentionSidebar");
  const seg = SEGMENTS[state.activeSegment];
  let html = `
    <div class="intention-sidebar__header">
      <span class="intention-sidebar__label">Intentions</span>
      <div class="badge-toggle" onclick="toggleBadges()" role="switch" aria-checked="${state.showBadges}" tabindex="0" aria-label="Toggle intent badges" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleBadges()}">
        <div class="badge-toggle__switch${state.showBadges ? ' on' : ''}" id="badgeSwitch"></div>
        <span class="badge-toggle__label">Badges</span>
      </div>
    </div>
    <div class="intention-list" id="intentionList">`;
  seg.intentions.forEach(intent => {
    const activeClass = (state.selectedIntention === intent.rank) ? ' active' : '';
    const expandedClass = (state.selectedIntention === intent.rank) ? ' expanded' : '';
    html += `
      <div class="intention-list__item${activeClass}" data-rank="${intent.rank}"
           onclick="selectIntention(${intent.rank})"
           onmouseenter="highlightIntention(${intent.rank})"
           onmouseleave="clearIntentionHighlight()">
        <span class="intention-list__rank">${intent.rank}</span>
        <span class="intention-list__label">${intent.label}</span>
        <span class="intention-type-badge intention-type-badge--${intent.type}">${intent.type.slice(0,3)}</span>
        ${intent.isPrimary ? '<span class="intention-primary-badge" title="Primary intention for this segment">P</span>' : ''}
      </div>
      <div class="intention-list__item-detail${expandedClass}" data-detail-rank="${intent.rank}">
        <div class="intention-list__item-detail__inner">
          ${renderIntentionInlineDetail(intent)}

      </div>`;
  });
  html += '</div>';
  sidebar.innerHTML = html;
}

      <li><strong>Trigger:</strong> ${intent.trigger}</li>
      <li><strong>Next Action:</strong> ${intent.nextAction}</li>
      <li><strong>Magazine Value:</strong> ${intent.serpValue}</li>
      <li><strong>Card Suggestion:</strong> ${intent.cardSuggestion}</li>

}

function renderSlot(slot, className, intentions, padded) {
  if (!slot) return '';
  const noPadTypes = ["hero-composite","image-card","image-site-card","professor-photo","nav-anchor","answer-bar","map"];
  const isPadded = noPadTypes.includes(slot.type) ? false : (padded || ["overview","subdivided","list","result","service","nav-anchor","news"].includes(slot.type));
  const paddedClass = isPadded ? "card--padded" : "";

  return `
    <div class="${className} card ${paddedClass} card--full slot-wrapper" data-serves="${slot.servesIntentions.join(",")}" data-slot-id="${slot.id}">
      ${slot.html}
    </div>`;
}

// ============================================================
// RENDER: Badge Overlay (positioned outside cards to avoid overflow clipping)
// ============================================================
function renderBadgeOverlay(seg) {
  const overlay = document.getElementById('badgeOverlay');
  if (!overlay) return;
  const scaler = document.getElementById('magazineScaler');
  if (!scaler) return;

  // Match overlay scale to magazine scale
  const scale = scaler.style.transform ? parseFloat(scaler.style.transform.match(/scale\(([^)]+)\)/)?.[1] || 1) : 1;
  overlay.style.transform = `scale(${scale})`;

  const query = seg.queries[0];
  const hiddenClass = state.showBadges ? '' : 'card-intent-badge--hidden';
  let badgeHtml = '';

  query.slots.forEach(slot => {
    // Find the slot element position relative to the grid
    const slotEl = scaler.querySelector(`[data-slot-id="${slot.id}"]`);
    if (!slotEl) return;
    const slotRect = slotEl.getBoundingClientRect();
    const scalerRect = scaler.getBoundingClientRect();
    // Calculate position in unscaled coordinates
    const top = (slotRect.top - scalerRect.top) / scale + 8;
    const right = (scalerRect.right - slotRect.right) / scale + 8;

    const badges = slot.servesIntentions.map(rank => {
      const intent = seg.intentions.find(i => i.rank === rank);
      const isPrimary = intent && intent.isPrimary;
      const tooltipText = intent ? intent.label : '';
      return `<span class="card-intent-badge__item${isPrimary ? ' card-intent-badge__item--primary' : ''}">
        #${rank}
        <span class="badge-tooltip">${tooltipText}</span>
      </span>`;
    }).join('');

    badgeHtml += `<div class="card-intent-badge ${hiddenClass}" style="top:${top}px;right:${right}px;">${badges}</div>`;
  });

  overlay.innerHTML = badgeHtml;
}

// ============================================================
// INTERACTIONS
// ============================================================
function selectIntention(rank) {
  // Toggle: if same rank clicked again, collapse it
  if (state.selectedIntention === rank) {
    state.selectedIntention = null;
    document.querySelectorAll('.intention-list__item').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.intention-list__item-detail').forEach(el => el.classList.remove('expanded'));
    clearIntentionHighlight();
    return;
  }
  state.selectedIntention = rank;
  // Update list active state
  document.querySelectorAll('.intention-list__item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.rank) === rank);
  });
  // Collapse all, expand selected
  document.querySelectorAll('.intention-list__item-detail').forEach(el => {
    el.classList.toggle('expanded', Number(el.dataset.detailRank) === rank);
  });
  // Highlight corresponding cards
  highlightIntention(rank);
}

function selectSegment(segmentId) {
  state.activeSegment = segmentId;
  state.hoveredIntention = null;
  state.selectedIntention = 1;
  renderSegmentTabs();
  renderIntentionSidebar();
  renderContent();
  document.getElementById("content").scrollTop = 0;
}

function toggleBadges() {
  state.showBadges = !state.showBadges;
  document.getElementById("badgeSwitch").className = "badge-toggle__switch" + (state.showBadges ? " on" : "");
  document.querySelector('.badge-toggle').setAttribute('aria-checked', state.showBadges);
  document.querySelectorAll('#badgeOverlay .card-intent-badge').forEach(el => {
    el.classList.toggle('card-intent-badge--hidden', !state.showBadges);
  });
}

function switchCarouselTab(tabName) {
  const seg = SEGMENTS[state.activeSegment];
  const query = seg.queries[0];
  if (!query.carousel) return;
  const carousel = query.carousel;
  // Update active tab
  document.querySelectorAll('.pole-slide__tab').forEach(btn => {
    btn.classList.toggle('pole-slide__tab--active', btn.dataset.tab === tabName);
  });
  // Re-render track items
  const items = carousel.items[tabName] || [];
  const track = document.getElementById('poleSlideTrack');
  if (!track) return;
  track.innerHTML = items.map(item => `<div class="pole-slide__card">
    <div class="pole-slide__card-body">
      <div class="pole-slide__card-title">${item.title}</div>
      <div class="pole-slide__card-source">
        <div class="pole-slide__card-favicon"><img src="${item.favicon}" alt=""></div>
        <span class="pole-slide__card-url">${item.url}</span>
      </div>
    </div>
    ${item.image ? `<div class="pole-slide__card-img"><img src="${item.image}" alt="${item.title}"></div>` : ''}
  </div>`).join('');
  track.scrollLeft = 0;
}

function scrollCarousel() {
  const track = document.getElementById('poleSlideTrack');
  if (!track) return;
  track.scrollBy({ left: 328, behavior: 'smooth' });
}

function highlightIntention(rank) {
  state.hoveredIntention = rank;
  document.querySelectorAll('.intention-list__item').forEach(el => {
    el.classList.toggle('highlighted', Number(el.dataset.rank) === rank);
  });
  document.querySelectorAll('.slot-wrapper').forEach(el => {
    const serves = el.dataset.serves.split(',').map(Number);
    el.classList.toggle('highlighted', serves.includes(rank));
  });
}

function clearIntentionHighlight() {
  state.hoveredIntention = null;
  document.querySelectorAll('.intention-list__item').forEach(el => {
    el.classList.remove('highlighted');
  });
  document.querySelectorAll('.slot-wrapper').forEach(el => {
    el.classList.remove('highlighted');
  });
}

// Card hover -> highlight matching intentions in list (no outline on card itself)
document.addEventListener('mouseenter', (e) => {
  const slot = e.target.closest('.slot-wrapper');
  if (!slot) return;
  const serves = slot.dataset.serves.split(',').map(Number);
  serves.forEach(rank => {
    const item = document.querySelector(`.intention-list__item[data-rank="${rank}"]`);
    if (item) item.classList.add('highlighted');
  });
}, true);

document.addEventListener('mouseleave', (e) => {
  const slot = e.target.closest('.slot-wrapper');
  if (!slot) return;
  if (state.hoveredIntention) return;
  document.querySelectorAll('.intention-list__item').forEach(el => {
    el.classList.remove('highlighted');
  });
}, true);

// ============================================================
// INIT
// ============================================================
renderSegmentTabs();
renderIntentionSidebar();
renderContent();

// Scale magazine to fit container width
function scaleMagazine() {
  const scaler = document.getElementById('magazineScaler');
  if (!scaler) return;
  const wrapper = scaler.parentElement;
  const available = wrapper.clientWidth;
  const scale = Math.min(1, available / 1208);
  scaler.style.transform = `scale(${scale})`;
  scaler.style.transformOrigin = 'top left';
  // Measure natural content height (magazine grid + optional pole-slide)
  scaler.style.height = 'auto';
  const naturalHeight = scaler.scrollHeight;
  scaler.style.height = (naturalHeight * scale) + 'px';
  // Sync badge overlay scale
  const overlay = document.getElementById('badgeOverlay');
  if (overlay) {
    overlay.style.transform = `scale(${scale})`;
  }
}
window.addEventListener('resize', () => {
  scaleMagazine();
  const seg = SEGMENTS[state.activeSegment];
  renderBadgeOverlay(seg);
});

// Image error fallback — show a neutral placeholder
document.addEventListener('error', (e) => {
  if (e.target.tagName === 'IMG') {
    e.target.style.display = 'none';
    const parent = e.target.parentElement;
    if (parent && !parent.querySelector('.img-fallback')) {
      const fallback = document.createElement('div');
      fallback.className = 'img-fallback';
      fallback.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bing-smtc-background-ctrl-neutral-rest,#efeae7);color:rgba(0,0,0,0.3);font-size:13px;';
      fallback.textContent = 'Image unavailable';
      parent.appendChild(fallback);
    }
  }
}, true);

// Initial pulse to show the connection between intention #1 and its cards
setTimeout(() => {
  highlightIntention(1);
  document.querySelectorAll('.slot-wrapper.highlighted').forEach(el => el.classList.add('pulse'));
  setTimeout(() => {
    clearIntentionHighlight();
    document.querySelectorAll('.slot-wrapper.pulse').forEach(el => el.classList.remove('pulse'));
  }, 1000);
}, 400);
</script>
